<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pong ML - Самообучающийся ИИ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>🤖 AI Pong ML — Самообучающийся ИИ</h1>
    <p>Управляй левой ракеткой мышкой | ИИ учится на своих ошибках</p>
    
    <div style="margin-bottom: 10px;">
        <button onclick="saveModel()">💾 Сохранить модель</button>
        <button onclick="loadModel()">📂 Загрузить модель</button>
        <button onclick="resetModel()">🔄 Сбросить обучение</button>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div style="margin-top: 10px;">
        <p>📊 Статистика: <span id="stats">Загрузка...</span></p>
        <p>🏆 Последняя награда: <span id="lastReward">0</span></p>
        <p>🎯 Действие ИИ: <span id="aiAction">stop</span></p>
    </div>
    
    <div id="qtable" style="margin-top: 20px; font-family: monospace; font-size: 12px; background: #222; padding: 10px; max-height: 300px; overflow-y: auto;">
        <strong>Q-таблица (ценность действий):</strong><br>
        Загрузка...
    </div>
    
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
    
    <script>
        let lastRewardDisplay = 0;
        
        setInterval(async () => {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                document.getElementById('stats').innerHTML = 
                    `Состояний в памяти: ${data.q_table_size} | ε=${data.epsilon.toFixed(3)}`;
            } catch(e) {}
        }, 2000);
        
        setInterval(async () => {
            try {
                const response = await fetch('/qtable');
                const data = await response.json();
                if (data.q_table && Object.keys(data.q_table).length > 0) {
                    let html = '<strong>Q-таблица (ценность действий):</strong><br><table border="1" cellpadding="5" style="border-collapse: collapse;">';
                    html += '<tr><th>Состояние</th><th>↑ up</th><th>↓ down</th><th>⏹ stop</th><th>Лучшее</th></tr>';
                    for (const [state, values] of Object.entries(data.q_table)) {
                        const bestIdx = values.indexOf(Math.max(...values));
                        const bestAction = ['up', 'down', 'stop'][bestIdx];
                        html += `<tr>
                            <td>${state}</td>
                            <td>${values[0].toFixed(2)}</td>
                            <td>${values[1].toFixed(2)}</td>
                            <td>${values[2].toFixed(2)}</td>
                            <td style="background:#0f0;">${bestAction}</td>
                        </tr>`;
                    }
                    html += '</table>';
                    document.getElementById('qtable').innerHTML = html;
                }
            } catch(e) {}
        }, 3000);
    </script>
    <div style="margin-top: 20px;">
        <canvas id="trainingChart" width="400" height="200" style="background: #333; border-radius: 10px;"></canvas>
    </div>
    <script>
        let chart;
        
        async function updateChart() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                
                if (data.timestamps && data.timestamps.length > 0) {
                    const labels = data.timestamps.map((_, i) => i);
                    
                    if (chart) {
                        chart.data.datasets[0].data = data.epsilon_values;
                        chart.data.datasets[1].data = data.qtable_sizes;
                        chart.update();
                    } else {
                        const ctx = document.getElementById('trainingChart').getContext('2d');
                        chart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [
                                    {
                                        label: 'Epsilon (исследование)',
                                        data: data.epsilon_values,
                                        borderColor: '#ff4444',
                                        backgroundColor: 'rgba(255,68,68,0.1)',
                                        tension: 0.1,
                                        yAxisID: 'y'
                                    },
                                    {
                                        label: 'Размер Q-таблицы',
                                        data: data.qtable_sizes,
                                        borderColor: '#44ff44',
                                        backgroundColor: 'rgba(68,255,68,0.1)',
                                        tension: 0.1,
                                        yAxisID: 'y1'
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                interaction: { mode: 'index', intersect: false },
                                plugins: { legend: { position: 'top' } },
                                scales: {
                                    y: { title: { display: true, text: 'Epsilon' }, min: 0, max: 1 },
                                    y1: { position: 'right', title: { display: true, text: 'Размер Q-таблицы' } }
                                }
                            }
                        });
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        setInterval(updateChart, 5000);
        setTimeout(updateChart, 1000);
    </script>
</body>
</html>
