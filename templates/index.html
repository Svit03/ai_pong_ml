<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pong ML - Самообучающийся ИИ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🤖 AI Pong ML</h1>
        <p class="subtitle">Самообучающийся ИИ | Управляй левой ракеткой мышкой</p>
        
        <div class="button-group">
            <button onclick="saveModel()" class="btn btn-save">💾 Сохранить модель</button>
            <button onclick="loadModel()" class="btn btn-load">📂 Загрузить модель</button>
            <button onclick="resetModel()" class="btn btn-reset">🔄 Сбросить обучение</button>
        </div>
        
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        
        <div class="stats-panel">
            <div class="stat-card">
                <span class="stat-label">🧠 Состояний в памяти</span>
                <span class="stat-value" id="stats">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">📉 Epsilon (исследование)</span>
                <span class="stat-value" id="epsilon">0.700</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">🏆 Последняя награда</span>
                <span class="stat-value" id="lastReward">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">🎯 Действие ИИ</span>
                <span class="stat-value" id="aiAction">stop</span>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>📈 Обучение ИИ</h3>
            <canvas id="trainingChart" width="600" height="250"></canvas>
        </div>
        
        <div class="qtable-container">
            <h3>📊 Q-таблица (ценность действий)</h3>
            <div id="qtable" class="qtable-content">
                Загрузка...
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
    
    <script>
        let chart;
        
        setInterval(async () => {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                document.getElementById('stats').innerHTML = data.q_table_size;
                document.getElementById('epsilon').innerHTML = data.epsilon.toFixed(3);
            } catch(e) {}
        }, 2000);
        
        setInterval(async () => {
            try {
                const response = await fetch('/qtable');
                const data = await response.json();
                if (data.q_table && Object.keys(data.q_table).length > 0) {
                    let html = '<table class="qtable">';
                    html += '<thead><tr><th>Состояние</th><th>⬆️ up</th><th>⬇️ down</th><th>⏹ stop</th><th>🏆 Лучшее</th></tr></thead><tbody>';
                    for (const [state, values] of Object.entries(data.q_table)) {
                        const bestIdx = values.indexOf(Math.max(...values));
                        const bestAction = ['up', 'down', 'stop'][bestIdx];
                        const bestIcon = bestAction === 'up' ? '⬆️' : (bestAction === 'down' ? '⬇️' : '⏹');
                        html += `<tr>
                            <td class="state-cell">${state}</td>
                            <td class="${bestIdx === 0 ? 'best-value' : ''}">${values[0].toFixed(1)}</td>
                            <td class="${bestIdx === 1 ? 'best-value' : ''}">${values[1].toFixed(1)}</td>
                            <td class="${bestIdx === 2 ? 'best-value' : ''}">${values[2].toFixed(1)}</td>
                            <td class="best-action">${bestIcon} ${bestAction}</td>
                        </tr>`;
                    }
                    html += '</tbody></table>';
                    document.getElementById('qtable').innerHTML = html;
                } else {
                    document.getElementById('qtable').innerHTML = '<p class="empty-message">⏳ Начните игру, чтобы заполнить Q-таблицу...</p>';
                }
            } catch(e) {}
        }, 3000);
        
        async function updateChart() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                
                if (data.timestamps && data.timestamps.length > 1) {
                    const labels = data.timestamps.map((_, i) => i);
                    
                    if (chart) {
                        chart.data.labels = labels;
                        chart.data.datasets[0].data = data.epsilon_values;
                        chart.data.datasets[1].data = data.qtable_sizes;
                        chart.update();
                    } else {
                        const ctx = document.getElementById('trainingChart').getContext('2d');
                        chart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [
                                    {
                                        label: 'Epsilon (исследование)',
                                        data: data.epsilon_values,
                                        borderColor: '#ff6b6b',
                                        backgroundColor: 'rgba(255,107,107,0.05)',
                                        borderWidth: 2,
                                        pointRadius: 2,
                                        pointBackgroundColor: '#ff6b6b',
                                        tension: 0.2,
                                        fill: true,
                                        yAxisID: 'y'
                                    },
                                    {
                                        label: 'Размер Q-таблицы',
                                        data: data.qtable_sizes,
                                        borderColor: '#51cf66',
                                        backgroundColor: 'rgba(81,207,102,0.05)',
                                        borderWidth: 2,
                                        pointRadius: 2,
                                        pointBackgroundColor: '#51cf66',
                                        tension: 0.2,
                                        fill: true,
                                        yAxisID: 'y1'
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                plugins: {
                                    legend: { position: 'top', labels: { color: '#fff', font: { size: 12 } } },
                                    tooltip: { mode: 'index', intersect: false, backgroundColor: '#222', titleColor: '#fff', bodyColor: '#ccc' }
                                },
                                scales: {
                                    x: { grid: { color: '#333' }, ticks: { color: '#888' } },
                                    y: { title: { display: true, text: 'Epsilon', color: '#ff6b6b' }, min: 0, max: 1, grid: { color: '#333' }, ticks: { color: '#888' } },
                                    y1: { position: 'right', title: { display: true, text: 'Размер Q-таблицы', color: '#51cf66' }, grid: { drawOnChartArea: false }, ticks: { color: '#888' } }
                                }
                            }
                        });
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        setInterval(updateChart, 4000);
        setTimeout(updateChart, 1500);
    </script>
</body>
</html>
