<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pong | Neural Learning</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-badge">AI RESEARCH LAB</div>
            <h1>AI Pong</h1>
            <p class="hero-sub">Самообучающийся интеллект · Играй против нейросети</p>
        </div>

        <div class="controls-primary">
            <button onclick="startGame()" class="primary-btn primary-btn-start">▶ Старт</button>
            <button onclick="pauseGame()" class="primary-btn primary-btn-pause">⏸ Пауза</button>
            <button onclick="resetFullGame()" class="primary-btn primary-btn-reset">⟳ Сброс игры</button>
        </div>

        <div class="game-stage">
            <div class="game-border"></div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div id="autoStatus" class="toast-status" style="display: none;">
            <span>🤖 АВТО-ОБУЧЕНИЕ АКТИВНО</span>
        </div>

        <div class="config-grid">
            <div class="config-card">
                <div class="card-icon">⚙️</div>
                <div class="card-title">Сложность</div>
                <div class="button-stack">
                    <button onclick="setDifficulty('EASY')" class="ghost-btn ghost-easy">Лёгкая</button>
                    <button onclick="setDifficulty('MEDIUM')" class="ghost-btn ghost-medium">Средняя</button>
                    <button onclick="setDifficulty('HARD')" class="ghost-btn ghost-hard">Сложная</button>
                </div>
                <div class="status-chip" id="difficultyDisplay">Средняя</div>
            </div>

            <div class="config-card">
                <div class="card-icon">🧠</div>
                <div class="card-title">Модель AI</div>
                <div class="button-stack">
                    <button onclick="saveModel()" class="ghost-btn ghost-save">💾 Сохранить</button>
                    <button onclick="loadModel()" class="ghost-btn ghost-load">📂 Загрузить</button>
                    <button onclick="resetModel()" class="ghost-btn ghost-reset">🗑 Сбросить</button>
                </div>
            </div>

            <div class="config-card">
                <div class="card-icon">⚡</div>
                <div class="card-title">Авто-обучение</div>
                <div class="auto-group">
                    <button onclick="startAutoTraining(100)" class="ghost-btn ghost-auto">100 игр</button>
                    <button onclick="startAutoTraining(500)" class="ghost-btn ghost-auto">500 игр</button>
                    <button onclick="startAutoTraining(1000)" class="ghost-btn ghost-auto">1000 игр</button>
                </div>
                <button onclick="stopAutoTraining()" class="ghost-btn ghost-stop">⏹ Остановить</button>
            </div>

            <div class="config-card">
                <div class="card-icon">📊</div>
                <div class="card-title">Телеметрия</div>
                <div class="metric-list">
                    <div class="metric"><span>Состояний</span><span id="stats" class="metric-value">0</span></div>
                    <div class="metric"><span>Epsilon</span><span id="epsilon" class="metric-value">0.700</span></div>
                    <div class="metric"><span>Награда</span><span id="lastReward" class="metric-value">0</span></div>
                    <div class="metric"><span>Действие</span><span id="aiAction" class="metric-value">stop</span></div>
                </div>
            </div>
        </div>

        <div class="insight-panel">
            <div class="insight-header">
                <span class="insight-title">📈 Кривая обучения</span>
                <span class="insight-badge">epsilon / q‑table</span>
            </div>
            <canvas id="trainingChart" width="600" height="220"></canvas>
        </div>

        <div class="insight-panel">
            <div class="insight-header">
                <span class="insight-title">📊 Q‑таблица</span>
                <span class="insight-badge">ценность действий</span>
            </div>
            <div id="qtable" class="qtable-wrap">
                <div class="loading-placeholder">Загрузка данных...</div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
    <script>
        let chart;
        
        setInterval(async () => {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                document.getElementById('stats').innerHTML = data.q_table_size;
                document.getElementById('epsilon').innerHTML = data.epsilon.toFixed(3);
            } catch(e) {}
        }, 2000);
        
        setInterval(async () => {
            try {
                const response = await fetch('/qtable');
                const data = await response.json();
                if (data.q_table && Object.keys(data.q_table).length > 0) {
                    let html = '<table class="qtable-modern">';
                    html += '<thead><tr><th>Состояние</th><th>⬆ up</th><th>⬇ down</th><th>⏹ stop</th><th>Лучшее</th></td></thead><tbody>';
                    for (const [state, values] of Object.entries(data.q_table)) {
                        const bestIdx = values.indexOf(Math.max(...values));
                        const bestAction = ['up', 'down', 'stop'][bestIdx];
                        let bestColor = '';
                        if (bestAction === 'up') bestColor = '#0a84ff';
                        else if (bestAction === 'down') bestColor = '#ff9f0a';
                        else bestColor = '#30d158';
                        html += `<tr>
                            <td class="state-highlight">${state}</td>
                            <td class="${bestIdx === 0 ? 'highlight-value-up' : ''}">${values[0].toFixed(1)}</td>
                            <td class="${bestIdx === 1 ? 'highlight-value-down' : ''}">${values[1].toFixed(1)}</td>
                            <td class="${bestIdx === 2 ? 'highlight-value-stop' : ''}">${values[2].toFixed(1)}</td>
                            <td class="best-badge" style="background: ${bestColor}15; color: ${bestColor};">${bestAction}</td>
                        </tr>`;
                    }
                    html += '</tbody></table>';
                    document.getElementById('qtable').innerHTML = html;
                } else {
                    document.getElementById('qtable').innerHTML = '<div class="loading-placeholder">Начните игру, чтобы заполнить Q‑таблицу</div>';
                }
            } catch(e) {}
        }, 3000);
        
        async function updateChart() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                if (data.timestamps && data.timestamps.length > 1) {
                    const labels = data.timestamps.map((_, i) => i);
                    if (chart) {
                        chart.data.labels = labels;
                        chart.data.datasets[0].data = data.epsilon_values;
                        chart.data.datasets[1].data = data.qtable_sizes;
                        chart.update();
                    } else {
                        const ctx = document.getElementById('trainingChart').getContext('2d');
                        chart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [
                                    {
                                        label: 'Epsilon',
                                        data: data.epsilon_values,
                                        borderColor: '#ff9f0a',
                                        backgroundColor: 'rgba(255,159,10,0.08)',
                                        borderWidth: 2.5,
                                        pointRadius: 3,
                                        pointBackgroundColor: '#ff9f0a',
                                        pointBorderColor: '#ff9f0a',
                                        tension: 0.2,
                                        fill: true
                                    },
                                    {
                                        label: 'Q‑таблица',
                                        data: data.qtable_sizes,
                                        borderColor: '#30d158',
                                        backgroundColor: 'rgba(48,209,88,0.08)',
                                        borderWidth: 2.5,
                                        pointRadius: 3,
                                        pointBackgroundColor: '#30d158',
                                        pointBorderColor: '#30d158',
                                        tension: 0.2,
                                        fill: true
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                plugins: {
                                    legend: { position: 'top', labels: { color: '#e5e5ea', font: { size: 11, family: 'Inter', weight: '500' } } },
                                    tooltip: { mode: 'index', intersect: false, backgroundColor: '#2c2c2e', titleColor: '#fff', bodyColor: '#aaa' }
                                },
                                scales: {
                                    x: { grid: { color: '#3a3a3c' }, ticks: { color: '#8e8e93' } },
                                    y: { grid: { color: '#3a3a3c' }, ticks: { color: '#8e8e93' } }
                                }
                            }
                        });
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        setInterval(updateChart, 4000);
        setTimeout(updateChart, 1500);
    </script>
</body>
</html>
